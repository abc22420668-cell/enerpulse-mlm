services:
  - type: web
    name: enerpulse-mlm
    env: docker
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@enerpulse.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: admin123
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,http://localhost:8000,http://127.0.0.1:8000"
      - key: SITE_URL
        value: "https://enerpulse-mlm.onrender.com"
      - key: SITE_NAME
        value: "EnerPulse MLM Platform"
    healthCheckPath: /
    autoDeploy: true
